<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AsakusaSemao</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #1e1e2e;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      top: -30%;
      left: -20%;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(124,106,255,0.15) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(255,106,155,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 16px;
      animation: fadeUp 0.6s 0.05s ease both;
    }

    .desc {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* App card */
    .apps {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      text-decoration: none;
      color: var(--text);
      text-align: left;
      transition: border-color 0.2s, transform 0.15s;
    }

    .app-card:hover {
      border-color: rgba(124,106,255,0.5);
      transform: translateY(-2px);
    }

    .app-card img {
      width: 56px;
      height: 56px;
      border-radius: 13px;
      flex-shrink: 0;
    }

    .app-card-text h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .app-card-text p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .app-card-arrow {
      margin-left: auto;
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
    }

    /* Footer links */
    .links {
      display: flex;
      justify-content: center;
      gap: 20px;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .links a {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main>
    <p class="logo">AsakusaSemao</p>
    <h1>スマホアプリを<br>つくっています。</h1>
    <p class="desc">個人でiOS・Androidアプリを開発しています。<br>現在リリースに向けて準備中のアプリはこちらです。</p>

    <div class="apps">
      <a class="app-card" href="/apps/vollog/">
        <img src="/assets/images/vollog-icon.png" alt="Vollogアイコン" />
        <div class="app-card-text">
          <h2>Vollog（バレログ）</h2>
          <p>バレーボールの選手管理・試合記録・スタッツ集計アプリ</p>
        </div>
        <span class="app-card-arrow">›</span>
      </a>
    </div>

    <div class="links">
      <a href="/apps/vollog/privacy.html">Vollog プライバシーポリシー</a>
      <a href="/apps/vollog/terms.html">Vollog 利用規約</a>
    </div>
  </main>
</body>
</html>
